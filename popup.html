<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SFU Co-op Prompt Compiler</title>
    <style>
        :root {
            --sfu-red: #CC0633;
            --sfu-red-dark: #a8052a;
            --bg: #f9f9f9;
            --text: #1f1f1f;
            --muted: #666;
            --border: #ddd;
            --success: #147a2e;
            --error: #b00020;
        }

        body {
            width: 360px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
        }

        h3 {
            margin: 0 0 12px;
            color: var(--sfu-red);
            text-align: center;
            font-size: 16px;
        }

        .button-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: var(--sfu-red);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s;
        }

        button:hover:not(:disabled) {
            background-color: var(--sfu-red-dark);
        }

        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        #status {
            margin-top: 10px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            min-height: 18px;
        }

        #preview {
            box-sizing: border-box;
            width: 100%;
            height: 220px;
            margin-top: 12px;
            padding: 10px;
            resize: vertical;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: white;
            color: var(--text);
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 12px;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        .hint {
            margin-top: 8px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.35;
        }
    </style>
</head>
<body>
    <h3>SFU Prompt Compiler</h3>

    <div class="button-row">
        <button id="generateBtn" type="button">Generate</button>
        <button id="copyBtn" type="button" disabled>Copy</button>
    </div>

    <div id="status" role="status" aria-live="polite"></div>

    <textarea id="preview" spellcheck="false" placeholder="Generated prompt will appear here before copying."></textarea>

    <div class="hint">
        Paste the copied prompt into the existing LLM chat that already contains your resume or past cover letters.
    </div>

    <script src="popup.js"></script>
</body>
</html>
